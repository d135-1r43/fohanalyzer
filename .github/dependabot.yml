version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docker:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    groups:
      svelte:
        patterns:
          - "svelte"
          - "@sveltejs/*"
      build-tools:
        patterns:
          - "vite"
      testing:
        patterns:
          - "vitest"
          - "@testing-library/*"
          - "jsdom"
