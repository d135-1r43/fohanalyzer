name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract semver from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          if [ "$PKG" != "${{ steps.ver.outputs.VERSION }}" ]; then
            echo "Tag ${{ steps.ver.outputs.VERSION }} does not match package.json version $PKG"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker

            ```
            docker pull ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.VERSION }}
            docker run -p 8080:80 ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.VERSION }}
            ```
